# ============================================================
# TIER LISTS - Ranked food items by category
# ============================================================
# Based on personal nutrition tier lists (Excel files in data/tier_lists/).
# Top/A/B tiers only. Items filtered for Vancouver grocery flyer relevance.
#
# Tier 1 = Top Tier (highest nutritional value)
# Tier 2 = A Tier (great options)
# Tier 3 = B Tier (good options)
#
# Each item has:
#   name:     Display name
#   keywords: Strings to match against flyer item names (case-insensitive)
#   avoid:    (optional) Skip if any of these words appear in the flyer item name

